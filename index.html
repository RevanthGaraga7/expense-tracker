<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h2 class="title">Expense Tracker</h2>

    <div class="container">

        <!-- Balance -->
        <h4>Current Balance</h4>
        <h1 id="balance">$0.00</h1>

        <!-- Income & Expense -->
        <div class="inc-exp-container">

            <div>
                <h4>Amount Credited</h4>
                <p id="money-plus" class="money-plus">+$0.00</p>
            </div>

            <div>
                <h4>Amount Deducted</h4>
                <p id="money-minus" class="money-minus">-$0.00</p>
            </div>

        </div>

        <!-- Form -->
        <h3>Add New Transaction</h3>

        <form id="form">

            <div class="form-control">
                <label for="text">Transaction Subject</label>
                <input 
                    type="text"
                    id="text"
                    placeholder="Enter transaction subject..."
                    pattern="[A-Za-z\s]+"
                    title="Only letters and spaces allowed"
                    required
                >
            </div>

            <div class="form-control">
                <label for="income-text">Amount Credited</label>
                <input 
                    type="number"
                    id="income-text"
                    placeholder="Enter amount credited..."
                >
            </div>

            <div class="form-control">
                <label for="expense-text">Amount Deducted</label>
                <input 
                    type="number"
                    id="expense-text"
                    placeholder="Enter amount deducted..."
                >
            </div>

            <!-- Transaction List -->
            <h3>Transactions</h3>

            <ul id="list" class="list">
                <!-- Items will be added here -->
            </ul>

            <button type="submit" class="btn">Add Transaction</button>
            <button type="button" class="btn btn-reset" id="reset-btn">Reset All</button>
            <button type="button" class="btn btn-history" id="history-btn">History</button>

        </form>

    </div>

    <!-- History Modal -->
    <div id="history-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="close-history">&times;</span>
            <h3>Transaction History</h3>
            <table id="history-table">
                <thead>
                    <tr>
                        <th>Transaction Subject</th>
                        <th>Amount Credited</th>
                        <th>Amount Debited</th>
                    </tr>
                </thead>
                <tbody id="history-body">
                </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
